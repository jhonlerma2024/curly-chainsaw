<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimAdmin · Caso Pisadas del Valle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap');

:root {
  --navy:  #0D1F3C;
  --teal:  #1A6B72;
  --gold:  #D4A017;
  --cream: #F8F4ED;
  --smoke: #E8E4DC;
  --white: #FFFFFF;
  --green: #1E8C54;
  --red:   #C0392B;
  --text:  #1A1A2E;
  --muted: #6B7280;
  --purple:#3B1F5E;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}

.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── LOGIN ── */
#s-login{align-items:center;justify-content:center;padding:2rem;
  background:radial-gradient(ellipse at 30% 20%, #1A3A5C 0%, var(--navy) 60%);}
.login-card{background:var(--white);border-radius:20px;padding:3rem 2.5rem;
  max-width:460px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.45);}
.logo{width:68px;height:68px;background:linear-gradient(135deg,var(--teal),var(--navy));
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;margin:0 auto 1.2rem;}
.login-card h1{font-family:'Sora',sans-serif;font-size:1.75rem;font-weight:800;
  color:var(--navy);text-align:center;margin-bottom:.2rem;}
.login-card .sub{color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:2rem;}
.lbl{display:block;font-size:.75rem;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--navy);margin-bottom:.35rem;}
.inp{width:100%;padding:.8rem 1rem;border:2px solid var(--smoke);border-radius:10px;
  font-size:.95rem;font-family:'Space Grotesk',sans-serif;color:var(--text);
  outline:none;transition:border-color .2s;margin-bottom:1.1rem;}
.inp:focus{border-color:var(--teal);}
.btn-main{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--teal),var(--navy));
  color:var(--white);border:none;border-radius:10px;font-size:1rem;
  font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-main:hover{opacity:.88;}
.profe-link{display:block;text-align:center;margin-top:1.1rem;font-size:.78rem;
  color:var(--muted);cursor:pointer;background:none;border:none;
  font-family:'Space Grotesk',sans-serif;text-decoration:underline;}

/* ── TOPBAR ── */
.topbar{background:var(--navy);padding:.9rem 1.5rem;display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;flex-shrink:0;}
.topbar-brand{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;
  color:var(--white);display:flex;align-items:center;gap:.5rem;}
.topbar-info{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
.topbar-user{background:rgba(255,255,255,.1);color:var(--white);
  padding:.35rem .9rem;border-radius:20px;font-size:.82rem;}
.timer-badge{background:var(--gold);color:var(--navy);padding:.35rem .9rem;
  border-radius:20px;font-size:.85rem;font-weight:700;font-family:'Sora',sans-serif;}
.timer-badge.warn{background:#C0392B;color:white;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* ── PROGRESS STEPPER ── */
.stepper{background:var(--white);border-bottom:1px solid var(--smoke);
  padding:.8rem 1.5rem;display:flex;align-items:center;gap:0;overflow-x:auto;flex-shrink:0;}
.step{display:flex;align-items:center;gap:.4rem;white-space:nowrap;}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--smoke);
  display:flex;align-items:center;justify-content:center;font-size:.75rem;
  font-weight:700;color:var(--muted);background:var(--white);flex-shrink:0;}
.step-dot.done{background:var(--green);border-color:var(--green);color:white;}
.step-dot.active{background:var(--teal);border-color:var(--teal);color:white;}
.step-label{font-size:.75rem;color:var(--muted);font-weight:500;}
.step-label.active{color:var(--teal);font-weight:700;}
.step-label.done{color:var(--green);}
.step-line{width:24px;height:2px;background:var(--smoke);flex-shrink:0;margin:0 .2rem;}
.step-line.done{background:var(--green);}

/* ── BODY ── */
.body-area{flex:1;overflow-y:auto;padding:1.5rem;max-width:820px;margin:0 auto;width:100%;}

/* ── CASO CARD ── */
.caso-hero{background:linear-gradient(135deg,var(--navy),var(--teal));
  border-radius:16px;padding:2rem;color:var(--white);margin-bottom:1.5rem;}
.caso-hero .tag{font-size:.7rem;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--gold);margin-bottom:.6rem;}
.caso-hero h2{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;
  margin-bottom:.8rem;line-height:1.3;}
.caso-hero p{font-size:.9rem;line-height:1.65;opacity:.9;}
.caso-data{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:.7rem;margin-top:1.2rem;}
.dato{background:rgba(255,255,255,.1);border-radius:10px;padding:.7rem .9rem;}
.dato .dlbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;
  opacity:.7;margin-bottom:.2rem;}
.dato .dval{font-size:.92rem;font-weight:600;}

/* ── SECTION CARD ── */
.sec-card{background:var(--white);border-radius:14px;padding:1.5rem;
  margin-bottom:1.2rem;box-shadow:0 3px 12px rgba(0,0,0,.06);}
.sec-card h3{font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;
  color:var(--navy);margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem;}
.sec-card .hint{font-size:.82rem;color:var(--muted);margin-bottom:1.1rem;line-height:1.5;}

/* ── QUIZ ── */
.q-wrap{margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--smoke);}
.q-wrap:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.q-text{font-size:.92rem;font-weight:600;color:var(--navy);margin-bottom:.7rem;line-height:1.5;}
.opts{display:flex;flex-direction:column;gap:.5rem;}
.opt{padding:.7rem .9rem;border:2px solid var(--smoke);border-radius:9px;
  background:var(--white);text-align:left;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:.87rem;color:var(--text);
  transition:border-color .15s,background .15s;display:flex;align-items:center;gap:.7rem;}
.opt:hover:not(:disabled){border-color:var(--teal);background:#F0FAFA;}
.opt.correct{border-color:var(--green);background:#D1FAE5;color:#065F46;font-weight:600;}
.opt.wrong{border-color:var(--red);background:#FEE2E2;color:var(--red);}
.opt:disabled{cursor:default;}
.opt-lt{width:24px;height:24px;border-radius:50%;background:var(--smoke);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.75rem;flex-shrink:0;}
.correct .opt-lt{background:var(--green);color:white;}
.wrong   .opt-lt{background:var(--red);color:white;}
.fb{font-size:.82rem;padding:.7rem .9rem;border-radius:8px;margin-top:.6rem;
  line-height:1.5;display:none;}
.fb.show{display:block;}
.fb.ok{background:#D1FAE5;color:#065F46;border-left:3px solid var(--green);}
.fb.ko{background:#FEE2E2;color:#991B1B;border-left:3px solid var(--red);}

/* ── FORMS ── */
.fg{margin-bottom:.9rem;}
.fg label{display:block;font-size:.75rem;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--navy);margin-bottom:.35rem;}
.fg textarea,.fg input,.fg select{width:100%;padding:.7rem .85rem;
  border:2px solid var(--smoke);border-radius:8px;font-size:.88rem;
  font-family:'Space Grotesk',sans-serif;color:var(--text);
  outline:none;transition:border-color .2s;resize:vertical;}
.fg textarea:focus,.fg input:focus,.fg select:focus{border-color:var(--teal);}

/* ── GANTT ── */
.gantt{width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:.8rem;}
.gantt th{background:var(--navy);color:var(--white);padding:.5rem .6rem;text-align:left;font-weight:600;}
.gantt td{padding:.45rem .6rem;border-bottom:1px solid var(--smoke);}
.gantt tr:nth-child(even) td{background:var(--cream);}
.gantt input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--teal);}

/* ── DOFA ── */
.dofa{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.8rem;}
.dc{padding:.9rem;border-radius:10px;border:2px solid transparent;}
.dc-f{background:#D1FAE5;border-color:#6EE7B7;} .dc-f label{color:#065F46;}
.dc-d{background:#FEE2E2;border-color:#FCA5A5;} .dc-d label{color:#991B1B;}
.dc-o{background:#DBEAFE;border-color:#93C5FD;} .dc-o label{color:#1E40AF;}
.dc-a{background:#FEF3C7;border-color:#FCD34D;} .dc-a label{color:#92400E;}
.dc label{font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;display:block;margin-bottom:.4rem;}
.dc textarea{border:1px solid rgba(0,0,0,.12)!important;background:rgba(255,255,255,.5);min-height:65px;}

/* ── PHVA TABS ── */
.ptabs{display:flex;gap:.4rem;margin-bottom:.9rem;flex-wrap:wrap;}
.ptab{padding:.45rem .9rem;border-radius:8px;border:2px solid var(--smoke);
  background:var(--white);cursor:pointer;font-family:'Space Grotesk',sans-serif;
  font-size:.82rem;font-weight:600;transition:all .15s;}
.ptab.p-p{background:#DBEAFE;border-color:#3B82F6;color:#1E40AF;}
.ptab.p-h{background:#D1FAE5;border-color:#10B981;color:#065F46;}
.ptab.p-v{background:#FEF3C7;border-color:#F59E0B;color:#92400E;}
.ptab.p-a{background:#FCE7F3;border-color:#EC4899;color:#9D174D;}
.ppanel{display:none;} .ppanel.active{display:block;}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:1.8fr 1fr 56px;
  align-items:center;gap:.6rem;margin-bottom:.7rem;}
.kpi-row span{font-size:.82rem;font-weight:500;color:var(--text);}
.kpi-row input[type=range]{accent-color:var(--teal);}
.kbadge{background:var(--navy);color:var(--white);padding:.2rem .5rem;
  border-radius:6px;font-size:.78rem;font-weight:700;text-align:center;}

/* ── BUTTONS ── */
.btn-next{background:var(--teal);color:var(--white);border:none;
  padding:.75rem 2rem;border-radius:10px;font-family:'Space Grotesk',sans-serif;
  font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:1rem;}
.btn-next:hover{background:var(--navy);}
.btn-submit{background:linear-gradient(135deg,var(--teal),var(--navy));
  color:var(--white);border:none;padding:.85rem 2rem;border-radius:10px;
  font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:600;
  cursor:pointer;width:100%;margin-top:1.2rem;transition:opacity .2s;}
.btn-submit:hover{opacity:.88;}

/* ── RESULTS ── */
#s-results{background:var(--navy);align-items:center;justify-content:center;padding:2rem;}
.res-card{background:var(--white);border-radius:20px;padding:2.5rem 2rem;
  max-width:620px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.45);}
.res-card h2{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;
  color:var(--navy);margin-bottom:.3rem;text-align:center;}
.res-sub{color:var(--muted);font-size:.88rem;text-align:center;margin-bottom:1.5rem;}
.score-big{width:120px;height:120px;border-radius:50%;margin:0 auto 1.5rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:800;}
.score-big .sn{font-size:2rem;line-height:1;}
.score-big .sl{font-size:.72rem;}
.sc-ex{background:linear-gradient(135deg,#D1FAE5,#6EE7B7);color:#065F46;}
.sc-go{background:linear-gradient(135deg,#DBEAFE,#93C5FD);color:#1E40AF;}
.sc-av{background:linear-gradient(135deg,#FEF3C7,#FCD34D);color:#92400E;}
.sc-lo{background:linear-gradient(135deg,#FEE2E2,#FCA5A5);color:#991B1B;}
.breakdown{margin-bottom:1.3rem;}
.brow{display:flex;justify-content:space-between;align-items:center;
  padding:.55rem 0;border-bottom:1px solid var(--smoke);font-size:.88rem;}
.brow:last-child{border-bottom:none;}
.bscore{padding:.18rem .55rem;border-radius:6px;font-weight:700;font-size:.82rem;}
.bs-hi{background:#D1FAE5;color:#065F46;}
.bs-md{background:#FEF3C7;color:#92400E;}
.bs-lo{background:#FEE2E2;color:#991B1B;}
.wsp-btn{display:block;width:100%;padding:.85rem;background:#25D366;
  color:white;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;
  font-size:.95rem;font-weight:700;cursor:pointer;margin-bottom:.7rem;text-align:center;}
.retry-btn{display:block;width:100%;padding:.75rem;background:var(--smoke);
  color:var(--navy);border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;
  font-size:.9rem;font-weight:600;cursor:pointer;}

/* ── TEACHER ── */
#s-teacher{background:var(--cream);}
.t-header{background:linear-gradient(135deg,#1A1A2E,var(--purple));
  padding:1.3rem 1.5rem;color:var(--white);display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;}
.t-header h2{font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:700;}
.t-body{padding:1.5rem;max-width:980px;margin:0 auto;}
.stat-chips{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.3rem;}
.chip{background:var(--white);border-radius:10px;padding:.6rem 1rem;
  font-size:.85rem;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.chip strong{color:var(--navy);}
.t-table{width:100%;border-collapse:collapse;font-size:.8rem;min-width:680px;}
.t-table th{background:var(--navy);color:var(--white);padding:.55rem .7rem;text-align:left;font-weight:600;}
.t-table td{padding:.5rem .7rem;border-bottom:1px solid var(--smoke);}
.t-table tr:nth-child(even) td{background:var(--cream);}
.t-btns{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1.2rem;}
.t-btn{padding:.55rem 1.1rem;border:none;border-radius:8px;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.85rem;}
.t-btn-ex{background:var(--teal);color:white;}
.t-btn-del{background:#FEE2E2;color:#991B1B;}
.back-btn{background:rgba(255,255,255,.15);border:none;color:var(--white);
  padding:.38rem .85rem;border-radius:8px;cursor:pointer;font-size:.82rem;
  font-family:'Space Grotesk',sans-serif;}

@media(max-width:600px){
  .dofa{grid-template-columns:1fr;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .body-area{padding:1rem;}
  .caso-data{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="s-login" class="screen active">
  <div class="login-card">
    <div class="logo">👟</div>
    <h1>SimAdmin</h1>
    <p class="sub">Caso práctico · Procesos Administrativos AN04N1</p>
    <label class="lbl" for="iname">Nombre completo</label>
    <input class="inp" id="iname" type="text" placeholder="Ej. Valentina Torres Giraldo" autocomplete="off">
    <label class="lbl" for="icode">Código estudiantil</label>
    <input class="inp" id="icode" type="text" placeholder="Ej. 20231045">
    <button class="btn-main" onclick="startApp()">Iniciar caso →</button>
    <button class="profe-link" onclick="openTeacher()">🔒 Acceso profesor</button>
  </div>
</div>

<!-- ══ CASO ══ -->
<div id="s-caso" class="screen">
  <div class="topbar">
    <div class="topbar-brand">👟 SimAdmin · Pisadas del Valle</div>
    <div class="topbar-info">
      <div class="topbar-user" id="tb-user">👤</div>
      <div class="timer-badge" id="timer-badge">60:00</div>
    </div>
  </div>

  <div class="stepper" id="stepper"></div>

  <div class="body-area" id="body-area"></div>
</div>

<!-- ══ RESULTS ══ -->
<div id="s-results" class="screen">
  <div class="res-card">
    <div class="score-big" id="res-ring">
      <span class="sn" id="res-num">0</span>
      <span class="sl">/ 100 pts</span>
    </div>
    <h2 id="res-title">¡Caso completado!</h2>
    <p class="res-sub" id="res-sub"></p>
    <div class="breakdown" id="res-breakdown"></div>
    <button class="wsp-btn" id="wsp-btn" onclick="sendWhatsApp()">📲 Enviar resultado al profesor por WhatsApp</button>
    <button class="retry-btn" onclick="retryApp()">↩ Volver a intentar</button>
  </div>
</div>

<!-- ══ TEACHER ══ -->
<div id="s-teacher" class="screen">
  <div class="t-header">
    <h2>📋 Panel del Profesor · SimAdmin</h2>
    <button class="back-btn" onclick="showScreen('s-login')">← Salir</button>
  </div>
  <div class="t-body">
    <div class="stat-chips" id="t-stats"></div>
    <div style="overflow-x:auto">
      <table class="t-table" id="t-table">
        <thead>
          <tr>
            <th>#</th><th>Nombre</th><th>Código</th>
            <th>F1 Quiz</th><th>F2 Planear</th><th>F3 Organizar</th><th>F4 Dirigir</th>
            <th>Total</th><th>Fecha</th>
          </tr>
        </thead>
        <tbody id="t-tbody"></tbody>
      </table>
    </div>
    <div class="t-btns">
      <button class="t-btn t-btn-ex" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="t-btn t-btn-del" onclick="clearAll()">🗑 Borrar registros</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const PASS = 'profe2026';
const WAPP = '573XXXXXXXXX'; // reemplaza con tu número Colombia

let student = {name:'', code:''};
let phase = 0;          // 0=intro, 1=quiz, 2=planear, 3=organizar, 4=dirigir
let scores = [0,0,0,0]; // F1 F2 F3 F4 (max 25 each)
let timerInterval = null;
let timeLeft = 3600;    // 60 min in seconds

const PHASES = [
  {label:'Introducción', icon:'📖'},
  {label:'F1 · Fundamentos', icon:'🏢'},
  {label:'F2 · Planear', icon:'📅'},
  {label:'F3 · Organizar', icon:'🏗'},
  {label:'F4 · Dirigir/Controlar', icon:'📊'},
];

// ═══════════════════════════════════════════════
//  CASO: PISADAS DEL VALLE
// ═══════════════════════════════════════════════
const CASO = `
<b>Pisadas del Valle</b> es una microempresa familiar de calzado artesanal ubicada en el barrio
<b>Guabal, en Cali</b>. Fue fundada en 2018 por doña Esperanza Mina y sus dos hijos. Fabrican
zapatos y sandalias en cuero con diseños propios y los venden directamente en su taller,
en el mercado de Galería Alameda y últimamente por WhatsApp.
<br><br>
Tienen <b>6 empleados</b>: 2 cortadores, 2 guarnecedores, 1 terminadora y doña Esperanza como
administradora/vendedora. El año pasado facturaron <b>$180 millones</b>, pero en los últimos
3 meses las ventas cayeron un <b>28%</b> y el costo de los insumos (cuero, pegantes, hilos)
subió un <b>15%</b>. Además, han recibido <b>quejas por demoras en entregas</b> y dos empleados
renunciaron sin previo aviso.
<br><br>
Doña Esperanza siente que la empresa <i>"ya no le cabe en la cabeza"</i> y ha pedido ayuda.
<b>Tú eres el consultor administrativo</b> que debe analizar la situación y proponer un plan
de mejora usando las herramientas vistas en clase.`;

const DATOS = [
  {l:'Sector',       v:'Manufactura artesanal'},
  {l:'Empleados',    v:'6 personas'},
  {l:'Ventas 2023',  v:'$180M anuales'},
  {l:'Caída ventas', v:'-28% últimos 3 meses'},
  {l:'Alza insumos', v:'+15%'},
  {l:'Ciudad',       v:'Cali, Valle del Cauca'},
];

// ═══════════════════════════════════════════════
//  QUIZ — 8 preguntas aplicadas al caso
// ═══════════════════════════════════════════════
const QUIZ = [
  {
    q:'Según el caso, Pisadas del Valle tiene problemas de ventas, costos y personal. ¿Cuál función administrativa está fallando PRINCIPALMENTE?',
    opts:['Solo la función de organización','Únicamente la función de control','Las funciones de planeación, dirección y control de forma simultánea','La función de marketing exclusivamente'],
    ans:2,
    fb:'El caso describe ausencia de planes (caída de ventas sin estrategia), falta de dirección (empleados renuncian) y falta de control (no se detectaron los problemas a tiempo). Las 4 funciones del PODC están comprometidas.'
  },
  {
    q:'Doña Esperanza actúa como administradora y vendedora al mismo tiempo. Según los niveles gerenciales, ella ocupa el rol de:',

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startApp(){
  const n = document.getElementById('iname').value.trim();
  const c = document.getElementById('icode').value.trim();
  if(!n||!c){alert('Ingresa tu nombre y código para continuar.');return;}
  student={name:n,code:c};
  document.getElementById('tb-user').textContent='👤 '+n.split(' ')[0];
  phase=0; scores=[0,0,0,0]; timeLeft=3600;
  startTimer();
  renderPhase(0);
  showScreen('s-caso');
}

function retryApp(){
  clearInterval(timerInterval);
  showScreen('s-login');
}

// ═══════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s=String(timeLeft%60).padStart(2,'0');
    const badge=document.getElementById('timer-badge');
    if(badge){
      badge.textContent=m+':'+s;
      if(timeLeft<=600) badge.classList.add('warn');
      else badge.classList.remove('warn');
    }
    if(timeLeft<=0){clearInterval(timerInterval);forceFinish();}
  },1000);
}

function forceFinish(){
  alert('⏰ Se acabó el tiempo. Registrando tus respuestas actuales.');
  finishSim();
}

//  STEPPER
// ═══════════════════════════════════════════════
function renderStepper(){
  const s=document.getElementById('stepper');
  s.innerHTML=PHASES.map((p,i)=>{
    const state=i<phase?'done':i===phase?'active':'';
    return `
      ${i>0?`<div class="step-line ${i<=phase?'done':''}"></div>`:''}
      <div class="step">
        <div class="step-dot ${state}">${i<phase?'✓':i+1}</div>
        <span class="step-label ${state}">${p.label}</span>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  PHASE ROUTER
// ═══════════════════════════════════════════════
function renderPhase(p){
  phase=p;
  renderStepper();
  const area=document.getElementById('body-area');
  area.innerHTML='';
  if(p===0) renderIntro();
  else if(p===1) renderQuiz();
  else if(p===2) renderPlanear();
  else if(p===3) renderOrganizar();
  else if(p===4) renderDirigir();
}

function nextPhase(){
  if(phase<4) renderPhase(phase+1);
  else finishSim();
}

function renderQuiz(){
  const area=document.getElementById('body-area');
  let correct=0;
  let answered=0;
  const letters=['A','B','C','D'];

  const qHTML=QUIZ.map((q,qi)=>`
    <div class="q-wrap" id="qw${qi}">
      <div class="q-text">${qi+1}. ${q.q}</div>
      <div class="opts">
        ${q.opts.map((o,oi)=>`
          <button class="opt" id="opt${qi}_${oi}"
            onclick="answerQ(${qi},${oi},${q.ans},'${encodeURIComponent(q.fb)}')">
            <span class="opt-lt">${letters[oi]}</span>${o}
          </button>`).join('')}
      </div>
      <div class="fb" id="fb${qi}"></div>
    </div>`).join('');

  area.innerHTML=`
    <div class="caso-hero" style="padding:1.2rem 1.5rem;margin-bottom:1rem">
      <div class="tag">Fase 1 · 8 preguntas · 25 puntos</div>
      <h2 style="font-size:1.1rem">Fundamentos Administrativos aplicados al caso</h2>
    </div>
    <div class="sec-card">
      <h3>📝 Responde todas las preguntas</h3>
      <div class="hint">Cada pregunta tiene retroalimentación inmediata. Debes responder las 8 para avanzar.</div>
      <div id="quiz-body">${qHTML}</div>
      <div id="quiz-result" style="display:none;margin-top:1rem;padding:1rem;border-radius:10px;background:var(--cream)"></div>
      <button class="btn-next" id="btn-quiz-next" style="display:none" onclick="submitQuiz()">Continuar a Fase 2 →</button>
    </div>`;

  window._quizAnswers=new Array(QUIZ.length).fill(null);

  window.answerQ=function(qi, oi, correct_i, fb_enc){
    if(window._quizAnswers[qi]!==null) return;
    window._quizAnswers[qi]=oi;

    const opts=document.querySelectorAll(`#qw${qi} .opt`);
    opts.forEach(b=>b.disabled=true);
    document.getElementById(`opt${qi}_${correct_i}`).classList.add('correct');
    if(oi!==correct_i) document.getElementById(`opt${qi}_${oi}`).classList.add('wrong');

    const fbEl=document.getElementById('fb'+qi);
    fbEl.textContent=decodeURIComponent(fb_enc);
    fbEl.className='fb show '+(oi===correct_i?'ok':'ko');

    const done=window._quizAnswers.filter(a=>a!==null).length;
    if(done===QUIZ.length){
      document.getElementById('btn-quiz-next').style.display='block';
    }
  };
}

function submitQuiz(){
  const correct=window._quizAnswers.filter((a,i)=>a===QUIZ[i].ans).length;
  scores[0]=Math.round((correct/QUIZ.length)*25);
  nextPhase();
}

function submitPlanear(){

  for(let f of fields){
    if(!document.getElementById(f).value.trim()){
      alert('Completa todos los campos del 5W-1H.');return;
    }
  }
  if(!document.getElementById('plan-type').value){
    alert('Selecciona el tipo de plan.');return;
  }
  let ganttChecked=0;
  for(let i=0;i<6;i++) for(let w=1;w<=8;w++)
    if(document.getElementById(`g${i}w${w}`)?.checked) ganttChecked++;
  if(ganttChecked<6){alert('Marca al menos una semana por cada actividad del Gantt.');return;}

  // Scoring
  let pts=0;
  fields.forEach(f=>{if(document.getElementById(f).value.trim().length>25) pts+=3;});
  // plan type
  const pt=document.getElementById('plan-type').value;
  pts+= pt==='op'?3:pt==='ta'?2:1;
  // gantt logic: check if diagnostic is in weeks 1-2
  const diag12=(document.getElementById('g0w1')?.checked||document.getElementById('g0w2')?.checked);
  if(diag12) pts+=2;
  pts=Math.min(pts,25);
  scores[1]=pts;
  nextPhase();
}

          <textarea id="phva-v" rows="3" placeholder="Se compara el tiempo promedio de entrega del mes anterior (10 días) con el actual. Meta: menos de 5 días..."></textarea>
        </div>
      </div>
      <div id="pp-ac" class="ppanel">
        <div class="fg">
          <label>Actuar — ¿Qué ajustes se hacen para el siguiente ciclo?</label>
          <textarea id="phva-a" rows="3" placeholder="Si la meta se cumplió, se estandariza el proceso. Si no, se identifican los cuellos de botella y..."></textarea>
        </div>
      </div>
    </div>

    <div class="sec-card">
      <h3>📋 Análisis DOFA — Pisadas del Valle</h3>
      <div class="hint">Completa la matriz DOFA de la empresa basándote en la información del caso.
      Incluye elementos específicos del caso, no generalidades.</div>
      <div class="dofa">
        <div class="dc dc-f">
          <label>💪 Fortalezas (internas positivas)</label>
          <textarea id="df" class="fg" rows="3" placeholder="Ej. Experiencia artesanal, producto diferenciado, vínculo con el barrio..."></textarea>
        </div>
        <div class="dc dc-d">
          <label>⚠️ Debilidades (internas negativas)</label>
          <textarea id="dd" class="fg" rows="3" placeholder="Ej. Sin estructura definida, dependencia de doña Esperanza, alta rotación..."></textarea>
        </div>
        <div class="dc dc-o">
          <label>🌟 Oportunidades (externas positivas)</label>
          <textarea id="do" class="fg" rows="3" placeholder="Ej. Crecimiento del comercio digital en Cali, tendencia de consumo local..."></textarea>
        </div>
        <div class="dc dc-a">
          <label>🌩 Amenazas (externas negativas)</label>
          <textarea id="da" class="fg" rows="3" placeholder="Ej. Importaciones de calzado chino más barato, alza de insumos..."></textarea>
        </div>
      </div>
    </div>

    <div class="sec-card">
      <h3>🎯 Habilidades directivas</h3>
      <div class="fg">
        <label>¿Cuál habilidad directiva debe desarrollar PRINCIPALMENTE doña Esperanza para resolver los problemas del caso?</label>
        <select id="skill">
          <option value="">— Selecciona —</option>
          <option value="tec">Técnica — aprender mejor las técnicas de fabricación de calzado</option>
          <option value="hum">Humana — liderar, motivar y retener a su equipo de trabajo</option>
          <option value="con">Conceptual — visión estratégica del negocio y el entorno</option>
        </select>
      </div>
      <div class="fg">
        <label>Explica por qué esa habilidad es la más crítica en este momento:</label>
        <textarea id="skill-just" rows="2" placeholder="Esta habilidad es prioritaria porque en el caso se evidencia que..."></textarea>
      </div>

      <button class="btn-submit" onclick="submitDirigir()">Finalizar caso y ver resultados →</button>
    </div>`;

  // Build KPI sliders
  const kpis=[
    {id:'kpi-ent', label:'Tiempo de entrega (% pedidos a tiempo)'},
    {id:'kpi-cal', label:'Satisfacción del cliente (% positivo)'},
    {id:'kpi-cos', label:'Control de costos (% dentro del presupuesto)'},
    {id:'kpi-ven', label:'Recuperación de ventas (% vs mes anterior)'},
    {id:'kpi-rot', label:'Retención de personal (% sin renuncias)'},
  ];
  const ka=document.getElementById('kpi-area');
  kpis.forEach(k=>{
    const d=document.createElement('div');
    d.className='kpi-row';
    d.innerHTML=`
      <span>${k.label}</span>
      <input type="range" id="${k.id}" min="0" max="100" value="70"
             oninput="document.getElementById('${k.id}-v').textContent=this.value+'%'">
      <div class="kbadge" id="${k.id}-v">70%</div>`;
    ka.appendChild(d);
  });
}

function switchP(tab){
  ['pl','ha','ve','ac'].forEach(t=>{
    document.getElementById('pp-'+t).classList.remove('active');
  });
  document.getElementById('pp-'+tab).classList.add('active');
  const map={pl:'p-p',ha:'p-h',ve:'p-v',ac:'p-a'};
  document.querySelectorAll('.ptab').forEach((b,i)=>{
    b.className='ptab';
    if(['pl','ha','ve','ac'][i]===tab) b.classList.add(map[tab]);
  });
}

function submitDirigir(){
  const txts=['phva-p','phva-h','phva-v','phva-a','df','dd','do','da','skill-just'];
  for(let t of txts){
    if(!document.getElementById(t).value.trim()){alert('Completa todos los campos del módulo.');return;}
  }
  if(!document.getElementById('skill').value){alert('Selecciona la habilidad directiva.');return;}

  let pts=0;
  // PHVA
  ['phva-p','phva-h','phva-v','phva-a'].forEach(id=>{
    if(document.getElementById(id).value.trim().length>40) pts+=3;
    else if(document.getElementById(id).value.trim().length>20) pts+=1;
  });
  // DOFA
  ['df','dd','do','da'].forEach(id=>{
    if(document.getElementById(id).value.trim().length>30) pts+=2;
    else if(document.getElementById(id).value.trim().length>10) pts+=1;
  });
  // Skill
  const sk=document.getElementById('skill').value;
  if(sk==='hum'||sk==='con') pts+=2;
  if(document.getElementById('skill-just').value.trim().length>40) pts+=1;

  pts=Math.min(pts,25);
  scores[3]=pts;

  clearInterval(timerInterval);
  finishSim();
}

// ═══════════════════════════════════════════════
//  FINISH
// ═══════════════════════════════════════════════
function finishSim(){
  const total=scores.reduce((a,b)=>a+b,0);
  saveRecord(total);

  // Score ring
  const ring=document.getElementById('res-ring');
  const cls=total>=80?'sc-ex':total>=60?'sc-go':total>=40?'sc-av':'sc-lo';
  ring.className='score-big '+cls;
  document.getElementById('res-num').textContent=total;

  const titles=total>=80?'¡Excelente consultor!':total>=60?'¡Buen trabajo!':total>=40?'Resultado aceptable':'Necesitas repasar';
  const subs={
    'sc-ex':'Dominaste los fundamentos y las herramientas del proceso administrativo aplicadas al caso.',
    'sc-go':'Comprendes bien los conceptos. Refuerza las áreas con menor puntaje.',
    'sc-av':'Hay conceptos que debes revisar. Vuelve al material de clase y reinténtalo.',
    'sc-lo':'Te recomendamos releer las unidades 1 y 2 antes de volver a intentarlo.'
  };
  document.getElementById('res-title').textContent=titles;
  document.getElementById('res-sub').textContent=subs[cls];

  const fnames=['F1 · Fundamentos','F2 · Planear','F3 · Organizar','F4 · Dirigir/Controlar'];
  document.getElementById('res-breakdown').innerHTML=`
    ${fnames.map((f,i)=>{
      const c=scores[i]>=20?'bs-hi':scores[i]>=13?'bs-md':'bs-lo';
      return `<div class="brow"><span>${f}</span><span class="bscore ${c}">${scores[i]}/25</span></div>`;
    }).join('')}
    <div class="brow" style="border-top:2px solid var(--smoke);margin-top:.3rem;padding-top:.5rem">
      <span><b>Total</b></span><span class="bscore ${cls==='sc-ex'?'bs-hi':cls==='sc-go'?'bs-hi':cls==='sc-av'?'bs-md':'bs-lo'}" style="font-size:.95rem">${total}/100</span>
    </div>`;

  showScreen('s-results');
}

function sendWhatsApp(){
  const total=scores.reduce((a,b)=>a+b,0);
  const txt=`📋 *Resultado SimAdmin — Pisadas del Valle*\n`+
    `👤 Estudiante: ${student.name}\n`+
    `🆔 Código: ${student.code}\n`+
    `📅 Fecha: ${new Date().toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'})}\n\n`+
    `F1 · Fundamentos: ${scores[0]}/25\n`+
    `F2 · Planear: ${scores[1]}/25\n`+
    `F3 · Organizar: ${scores[2]}/25\n`+
    `F4 · Dirigir/Controlar: ${scores[3]}/25\n\n`+
    `✅ *TOTAL: ${total}/100*`;
  const url=`https://wa.me/${WAPP}?text=${encodeURIComponent(txt)}`;
  window.open(url,'_blank');
}

// ═══════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════
function saveRecord(total){
  const r={
    name:student.name, code:student.code,
    scores:[...scores], total,
    date:new Date().toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'})
  };
  const all=JSON.parse(localStorage.getItem('simadmin_v2')||'[]');
  const idx=all.findIndex(x=>x.code===student.code);
  if(idx>=0) all[idx]=r; else all.push(r);
  localStorage.setItem('simadmin_v2',JSON.stringify(all));
}

// ═══════════════════════════════════════════════
//  TEACHER PANEL
// ═══════════════════════════════════════════════
function openTeacher(){
  const p=prompt('🔒 Contraseña del profesor:');
  if(p===null) return;
  if(p!==PASS){alert('Contraseña incorrecta.');return;}
  renderTeacher();
  showScreen('s-teacher');
}

function renderTeacher(){
  const all=JSON.parse(localStorage.getItem('simadmin_v2')||'[]');
  const totals=all.map(r=>r.total);
  const avg=totals.length?Math.round(totals.reduce((a,b)=>a+b,0)/totals.length):0;
  const maxT=totals.length?Math.max(...totals):0;
  const pasT=totals.filter(t=>t>=60).length;

  document.getElementById('t-stats').innerHTML=`
    <div class="chip">👥 <strong>${all.length}</strong> estudiantes</div>
    <div class="chip">📊 Promedio: <strong>${avg}/100</strong></div>
    <div class="chip">🏆 Mejor nota: <strong>${maxT}/100</strong></div>
    <div class="chip">✅ Aprobados (≥60): <strong>${pasT}/${all.length}</strong></div>`;

  const sorted=[...all].sort((a,b)=>b.total-a.total);
  const medals=['🥇','🥈','🥉'];
  document.getElementById('t-tbody').innerHTML= sorted.length===0
    ? `<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:2rem">Sin registros aún.</td></tr>`
    : sorted.map((r,i)=>{
        const tc=r.total>=80?'bs-hi':r.total>=60?'bs-md':'bs-lo';
        return `<tr>
          <td>${medals[i]||i+1}</td>
          <td><b>${r.name}</b></td>
          <td style="color:var(--muted)">${r.code}</td>
          ${r.scores.map(s=>{const c=s>=20?'bs-hi':s>=13?'bs-md':'bs-lo';
            return `<td><span class="bscore ${c}">${s}/25</span></td>`;}).join('')}
          <td><span class="bscore ${tc}" style="font-size:.88rem">${r.total}/100</span></td>
          <td style="color:var(--muted);font-size:.75rem">${r.date}</td>
        </tr>`;
      }).join('');
}

function exportCSV(){
  const all=JSON.parse(localStorage.getItem('simadmin_v2')||'[]');
  if(!all.length){alert('No hay registros.');return;}
  const hdr='Nombre,Código,F1-Fundamentos,F2-Planear,F3-Organizar,F4-Dirigir,Total,Fecha';
  const rows=all.map(r=>`"${r.name}","${r.code}",${r.scores.join(',')},${r.total},"${r.date}"`);
  const blob=new Blob([[hdr,...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='pisadas_notas.csv'; a.click();
}

function clearAll(){
  if(!confirm('¿Borrar TODOS los registros? Esta acción no se puede deshacer.')) return;
  localStorage.removeItem('simadmin_v2');
  renderTeacher();
}
</script>
