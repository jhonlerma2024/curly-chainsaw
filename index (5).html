<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimAdmin · Pisadas del Valle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap');
:root{
  --navy:#0D1F3C;--teal:#1A6B72;--gold:#D4A017;--cream:#F8F4ED;
  --smoke:#E8E4DC;--white:#FFFFFF;--green:#1E8C54;--red:#C0392B;
  --text:#1A1A2E;--muted:#6B7280;--purple:#3B1F5E;--blue:#1E40AF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* LOGIN */
#s-login{align-items:center;justify-content:center;padding:2rem;
  background:radial-gradient(ellipse at 30% 20%,#1A3A5C 0%,var(--navy) 70%);}
.login-card{background:var(--white);border-radius:20px;padding:3rem 2.5rem;
  max-width:460px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.45);text-align:center;}
.logo{width:68px;height:68px;background:linear-gradient(135deg,var(--teal),var(--navy));
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;margin:0 auto 1.2rem;}
.login-card h1{font-family:'Sora',sans-serif;font-size:1.75rem;font-weight:800;color:var(--navy);margin-bottom:.2rem;}
.login-card .sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem;}
.lbl{display:block;text-align:left;font-size:.75rem;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--navy);margin-bottom:.35rem;}
.inp{width:100%;padding:.8rem 1rem;border:2px solid var(--smoke);border-radius:10px;
  font-size:.95rem;font-family:'Space Grotesk',sans-serif;color:var(--text);
  outline:none;transition:border-color .2s;margin-bottom:1.1rem;}
.inp:focus{border-color:var(--teal);}
.btn-main{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--teal),var(--navy));
  color:var(--white);border:none;border-radius:10px;font-size:1rem;
  font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-main:hover{opacity:.88;}
.profe-link{display:block;text-align:center;margin-top:1.1rem;font-size:.78rem;
  color:var(--muted);cursor:pointer;background:none;border:none;
  font-family:'Space Grotesk',sans-serif;text-decoration:underline;}

/* TOPBAR */
.topbar{background:var(--navy);padding:.9rem 1.5rem;display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;flex-shrink:0;}
.topbar-brand{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;
  color:var(--white);display:flex;align-items:center;gap:.5rem;}
.topbar-info{display:flex;align-items:center;gap:.8rem;}
.topbar-user{background:rgba(255,255,255,.1);color:var(--white);
  padding:.35rem .9rem;border-radius:20px;font-size:.82rem;}
.timer-badge{background:var(--gold);color:var(--navy);padding:.35rem .9rem;
  border-radius:20px;font-size:.85rem;font-weight:700;font-family:'Sora',sans-serif;}
.timer-badge.warn{background:#C0392B;color:white;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* STEPPER */
.stepper{background:var(--white);border-bottom:1px solid var(--smoke);
  padding:.8rem 1.5rem;display:flex;align-items:center;gap:0;overflow-x:auto;flex-shrink:0;}
.step{display:flex;align-items:center;gap:.4rem;white-space:nowrap;}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--smoke);
  display:flex;align-items:center;justify-content:center;font-size:.72rem;
  font-weight:700;color:var(--muted);background:var(--white);flex-shrink:0;transition:all .3s;}
.step-dot.done{background:var(--green);border-color:var(--green);color:white;}
.step-dot.active{background:var(--teal);border-color:var(--teal);color:white;}
.step-lbl{font-size:.72rem;color:var(--muted);font-weight:500;}
.step-lbl.active{color:var(--teal);font-weight:700;}
.step-lbl.done{color:var(--green);}
.step-line{width:20px;height:2px;background:var(--smoke);flex-shrink:0;margin:0 .2rem;transition:background .3s;}
.step-line.done{background:var(--green);}

/* BODY */
.body-area{flex:1;overflow-y:auto;padding:1.5rem;max-width:840px;margin:0 auto;width:100%;}

/* CARDS */
.caso-hero{background:linear-gradient(135deg,var(--navy),var(--teal));
  border-radius:16px;padding:1.8rem;color:var(--white);margin-bottom:1.3rem;}
.caso-hero .tag{font-size:.7rem;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;}
.caso-hero h2{font-family:'Sora',sans-serif;font-size:1.35rem;font-weight:800;
  margin-bottom:.7rem;line-height:1.3;}
.caso-hero p{font-size:.88rem;line-height:1.65;opacity:.92;}
.caso-data{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:.6rem;margin-top:1.1rem;}
.dato{background:rgba(255,255,255,.1);border-radius:9px;padding:.6rem .8rem;}
.dato .dlbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;opacity:.7;margin-bottom:.15rem;}
.dato .dval{font-size:.88rem;font-weight:600;}

.sec-card{background:var(--white);border-radius:14px;padding:1.4rem;
  margin-bottom:1.1rem;box-shadow:0 3px 12px rgba(0,0,0,.06);}
.sec-card h3{font-family:'Sora',sans-serif;font-size:.98rem;font-weight:700;
  color:var(--navy);margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem;}
.sec-card .hint{font-size:.82rem;color:var(--muted);margin-bottom:1rem;line-height:1.5;}

/* QUIZ */
.q-wrap{margin-bottom:1.1rem;padding-bottom:1.1rem;border-bottom:1px solid var(--smoke);}
.q-wrap:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.q-num{font-size:.72rem;font-weight:700;color:var(--teal);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:.3rem;}
.q-text{font-size:.91rem;font-weight:600;color:var(--navy);margin-bottom:.65rem;line-height:1.5;}
.opts{display:flex;flex-direction:column;gap:.45rem;}
.opt{padding:.65rem .9rem;border:2px solid var(--smoke);border-radius:9px;
  background:var(--white);text-align:left;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:.86rem;color:var(--text);
  transition:border-color .15s,background .15s;display:flex;align-items:center;gap:.65rem;}
.opt:hover:not(:disabled){border-color:var(--teal);background:#F0FAFA;}
.opt.correct{border-color:var(--green);background:#D1FAE5;color:#065F46;font-weight:600;}
.opt.wrong{border-color:var(--red);background:#FEE2E2;color:var(--red);}
.opt:disabled{cursor:default;}
.opt-lt{width:22px;height:22px;border-radius:50%;background:var(--smoke);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.72rem;flex-shrink:0;}
.correct .opt-lt{background:var(--green);color:white;}
.wrong   .opt-lt{background:var(--red);color:white;}
.fb{font-size:.81rem;padding:.65rem .9rem;border-radius:8px;margin-top:.5rem;
  line-height:1.5;display:none;}
.fb.show{display:block;}
.fb.ok{background:#D1FAE5;color:#065F46;border-left:3px solid var(--green);}
.fb.ko{background:#FEE2E2;color:#991B1B;border-left:3px solid var(--red);}
.quiz-score-bar{background:var(--cream);border-radius:8px;padding:.7rem 1rem;
  margin-bottom:1rem;font-size:.85rem;display:flex;justify-content:space-between;align-items:center;}

/* FORMS */
.fg{margin-bottom:.85rem;}
.fg label{display:block;font-size:.73rem;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--navy);margin-bottom:.3rem;}
.fg textarea,.fg input,.fg select{width:100%;padding:.68rem .85rem;
  border:2px solid var(--smoke);border-radius:8px;font-size:.87rem;
  font-family:'Space Grotesk',sans-serif;color:var(--text);
  outline:none;transition:border-color .2s;resize:vertical;}
.fg textarea:focus,.fg input:focus,.fg select:focus{border-color:var(--teal);}

/* GANTT */
.gantt{width:100%;border-collapse:collapse;font-size:.77rem;margin-bottom:.8rem;}
.gantt th{background:var(--navy);color:var(--white);padding:.5rem .5rem;text-align:left;font-weight:600;}
.gantt td{padding:.42rem .5rem;border-bottom:1px solid var(--smoke);font-size:.8rem;}
.gantt tr:nth-child(even) td{background:var(--cream);}
.gantt input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--teal);}

/* MAPA DE PROCESO */
.proceso-wrap{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.proceso-item{display:flex;align-items:center;gap:.6rem;}
.proceso-num{width:28px;height:28px;border-radius:50%;background:var(--navy);
  color:white;font-weight:700;font-size:.78rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.proceso-select{flex:1;padding:.6rem .8rem;border:2px solid var(--smoke);
  border-radius:8px;font-size:.84rem;font-family:'Space Grotesk',sans-serif;
  color:var(--text);outline:none;transition:border-color .2s;}
.proceso-select:focus{border-color:var(--teal);}
.proceso-select.correct-sel{border-color:var(--green);background:#D1FAE5;}
.proceso-select.wrong-sel{border-color:var(--red);background:#FEE2E2;}
.proceso-arrow{font-size:1.2rem;color:var(--teal);}

/* FLUJOGRAMA */
.flujo-wrap{display:flex;flex-direction:column;align-items:center;gap:.3rem;margin:1rem 0;}
.flujo-node{display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:.78rem;font-weight:600;padding:.5rem .8rem;min-width:180px;max-width:240px;}
.flujo-oval{background:var(--navy);color:white;border-radius:30px;}
.flujo-rect{background:#DBEAFE;border:2px solid #93C5FD;color:#1E40AF;border-radius:6px;}
.flujo-diamond{background:#FEF3C7;border:2px solid #FCD34D;color:#92400E;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  padding:.8rem 1.5rem;min-width:160px;min-height:70px;}
.flujo-arrow{font-size:1.1rem;color:var(--muted);}
.flujo-row{display:flex;align-items:center;gap:.5rem;justify-content:center;}
.flujo-branch{font-size:.7rem;color:var(--muted);font-weight:600;}
.flujo-select{padding:.55rem .8rem;border:2px solid var(--smoke);border-radius:8px;
  font-size:.82rem;font-family:'Space Grotesk',sans-serif;color:var(--text);
  outline:none;min-width:160px;transition:border-color .2s;}
.flujo-select:focus{border-color:var(--teal);}
.flujo-select.correct-sel{border-color:var(--green);background:#D1FAE5;}
.flujo-select.wrong-sel{border-color:var(--red);background:#FEE2E2;}

/* DOFA */
.dofa{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.8rem;}
.dc{padding:.9rem;border-radius:10px;border:2px solid transparent;}
.dc-f{background:#D1FAE5;border-color:#6EE7B7;} .dc-f label{color:#065F46;}
.dc-d{background:#FEE2E2;border-color:#FCA5A5;} .dc-d label{color:#991B1B;}
.dc-o{background:#DBEAFE;border-color:#93C5FD;} .dc-o label{color:#1E40AF;}
.dc-a{background:#FEF3C7;border-color:#FCD34D;} .dc-a label{color:#92400E;}
.dc label{font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;display:block;margin-bottom:.4rem;}
.dc textarea{border:1px solid rgba(0,0,0,.12)!important;
  background:rgba(255,255,255,.5);min-height:60px;}

/* PHVA TABS */
.ptabs{display:flex;gap:.4rem;margin-bottom:.9rem;flex-wrap:wrap;}
.ptab{padding:.42rem .85rem;border-radius:8px;border:2px solid var(--smoke);
  background:var(--white);cursor:pointer;font-family:'Space Grotesk',sans-serif;
  font-size:.8rem;font-weight:600;transition:all .15s;}
.ptab.p-p{background:#DBEAFE;border-color:#3B82F6;color:#1E40AF;}
.ptab.p-h{background:#D1FAE5;border-color:#10B981;color:#065F46;}
.ptab.p-v{background:#FEF3C7;border-color:#F59E0B;color:#92400E;}
.ptab.p-a{background:#FCE7F3;border-color:#EC4899;color:#9D174D;}
.ppanel{display:none;} .ppanel.active{display:block;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:1.8fr 1fr 52px;
  align-items:center;gap:.6rem;margin-bottom:.65rem;}
.kpi-row span{font-size:.81rem;font-weight:500;}
.kpi-row input[type=range]{accent-color:var(--teal);}
.kbadge{background:var(--navy);color:var(--white);padding:.18rem .5rem;
  border-radius:6px;font-size:.76rem;font-weight:700;text-align:center;}

/* BUTTONS */
.btn-next{background:var(--teal);color:var(--white);border:none;
  padding:.72rem 1.8rem;border-radius:10px;font-family:'Space Grotesk',sans-serif;
  font-size:.93rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.9rem;}
.btn-next:hover{background:var(--navy);}
.btn-submit{background:linear-gradient(135deg,var(--teal),var(--navy));
  color:var(--white);border:none;padding:.82rem 2rem;border-radius:10px;
  font-family:'Space Grotesk',sans-serif;font-size:.93rem;font-weight:600;
  cursor:pointer;width:100%;margin-top:1.1rem;transition:opacity .2s;}
.btn-submit:hover{opacity:.88;}

/* RESULTS */
#s-results{background:var(--navy);align-items:center;justify-content:center;padding:2rem;}
.res-card{background:var(--white);border-radius:20px;padding:2.5rem 2rem;
  max-width:600px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.45);}
.res-card h2{font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:800;
  color:var(--navy);margin-bottom:.3rem;text-align:center;}
.res-sub{color:var(--muted);font-size:.86rem;text-align:center;margin-bottom:1.4rem;}
.score-big{width:115px;height:115px;border-radius:50%;margin:0 auto 1.4rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:800;}
.score-big .sn{font-size:1.9rem;line-height:1;}
.score-big .sl{font-size:.7rem;}
.sc-ex{background:linear-gradient(135deg,#D1FAE5,#6EE7B7);color:#065F46;}
.sc-go{background:linear-gradient(135deg,#DBEAFE,#93C5FD);color:#1E40AF;}
.sc-av{background:linear-gradient(135deg,#FEF3C7,#FCD34D);color:#92400E;}
.sc-lo{background:linear-gradient(135deg,#FEE2E2,#FCA5A5);color:#991B1B;}
.brow{display:flex;justify-content:space-between;align-items:center;
  padding:.5rem 0;border-bottom:1px solid var(--smoke);font-size:.87rem;}
.brow:last-child{border-bottom:none;}
.bscore{padding:.16rem .5rem;border-radius:6px;font-weight:700;font-size:.8rem;}
.bs-hi{background:#D1FAE5;color:#065F46;}
.bs-md{background:#FEF3C7;color:#92400E;}
.bs-lo{background:#FEE2E2;color:#991B1B;}
.wsp-btn{display:block;width:100%;padding:.82rem;background:#25D366;
  color:white;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;
  font-size:.92rem;font-weight:700;cursor:pointer;margin-bottom:.6rem;}
.retry-btn{display:block;width:100%;padding:.72rem;background:var(--smoke);
  color:var(--navy);border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;
  font-size:.88rem;font-weight:600;cursor:pointer;}

/* TEACHER */
#s-teacher{background:var(--cream);}
.t-header{background:linear-gradient(135deg,#1A1A2E,var(--purple));
  padding:1.2rem 1.5rem;color:var(--white);display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;}
.t-header h2{font-family:'Sora',sans-serif;font-size:1.15rem;font-weight:700;}
.t-body{padding:1.5rem;max-width:980px;margin:0 auto;}
.stat-chips{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.chip{background:var(--white);border-radius:10px;padding:.55rem .95rem;
  font-size:.84rem;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.chip strong{color:var(--navy);}
.t-table{width:100%;border-collapse:collapse;font-size:.79rem;min-width:700px;}
.t-table th{background:var(--navy);color:var(--white);padding:.52rem .65rem;text-align:left;font-weight:600;}
.t-table td{padding:.48rem .65rem;border-bottom:1px solid var(--smoke);}
.t-table tr:nth-child(even) td{background:var(--cream);}
.t-btns{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:1.1rem;}
.t-btn{padding:.52rem 1rem;border:none;border-radius:8px;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.83rem;}
.t-btn-ex{background:var(--teal);color:white;}
.t-btn-del{background:#FEE2E2;color:#991B1B;}
.back-btn{background:rgba(255,255,255,.15);border:none;color:var(--white);
  padding:.36rem .82rem;border-radius:8px;cursor:pointer;font-size:.8rem;
  font-family:'Space Grotesk',sans-serif;}

.info-box{background:#EFF6FF;border-left:4px solid #3B82F6;border-radius:0 8px 8px 0;
  padding:.8rem 1rem;margin-bottom:1rem;font-size:.83rem;color:#1E40AF;line-height:1.5;}

@media(max-width:600px){
  .dofa{grid-template-columns:1fr;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .body-area{padding:1rem;}
  .caso-data{grid-template-columns:1fr 1fr;}
  .flujo-diamond{clip-path:none;border-radius:8px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-card">
    <div class="logo">👟</div>
    <h1>SimAdmin</h1>
    <p class="sub">Caso práctico · Procesos Administrativos AN04N1<br>
    <span style="color:var(--teal);font-weight:600">Pisadas del Valle · Cali, Colombia</span></p>
    <label class="lbl" for="iname">Nombre completo</label>
    <input class="inp" id="iname" type="text" placeholder="Ej. Valentina Torres Giraldo" autocomplete="off">
    <label class="lbl" for="icode">Código estudiantil</label>
    <input class="inp" id="icode" type="text" placeholder="Ej. 20231045">
    <button class="btn-main" onclick="startApp()">Iniciar caso →</button>
    <button class="profe-link" onclick="openTeacher()">🔒 Acceso profesor</button>
  </div>
</div>

<!-- CASO -->
<div id="s-caso" class="screen">
  <div class="topbar">
    <div class="topbar-brand">👟 SimAdmin · Pisadas del Valle</div>
    <div class="topbar-info">
      <div class="topbar-user" id="tb-user">👤</div>
      <div class="timer-badge" id="timer-badge">60:00</div>
    </div>
  </div>
  <div class="stepper" id="stepper"></div>
  <div class="body-area" id="body-area"></div>
</div>

<!-- RESULTS -->
<div id="s-results" class="screen">
  <div class="res-card">
    <div class="score-big" id="res-ring">
      <span class="sn" id="res-num">0</span>
      <span class="sl">/ 100 pts</span>
    </div>
    <h2 id="res-title">¡Caso completado!</h2>
    <p class="res-sub" id="res-sub"></p>
    <div id="res-breakdown" style="margin-bottom:1.2rem"></div>
    <button class="wsp-btn" onclick="sendWhatsApp()">📲 Enviar resultado al profesor por WhatsApp</button>
    <button class="retry-btn" onclick="retryApp()">↩ Volver a intentar</button>
  </div>
</div>

<!-- TEACHER -->
<div id="s-teacher" class="screen">
  <div class="t-header">
    <h2>📋 Panel del Profesor · SimAdmin</h2>
    <button class="back-btn" onclick="showScreen('s-login')">← Salir</button>
  </div>
  <div class="t-body">
    <div class="stat-chips" id="t-stats"></div>
    <div style="overflow-x:auto">
      <table class="t-table">
        <thead>
          <tr><th>#</th><th>Nombre</th><th>Código</th>
          <th>F1·Quiz</th><th>F2·Proceso</th><th>F3·Planear</th><th>F4·Dirigir</th>
          <th>Total</th><th>Fecha</th></tr>
        </thead>
        <tbody id="t-tbody"></tbody>
      </table>
    </div>
    <div class="t-btns">
      <button class="t-btn t-btn-ex" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="t-btn t-btn-del" onclick="clearAll()">🗑 Borrar registros</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const PASS = 'profe2026';
const WAPP = '573XXXXXXXXX'; // ← Reemplaza con tu número WhatsApp Colombia

// ═══════════════════════════════════════
//  STATE — siempre se reinicia al entrar
// ═══════════════════════════════════════
let student = {name:'',code:''};
let phase   = 0;
let scores  = [0,0,0,0];
let timerInterval = null;
let timeLeft = 3600;
let selectedQuiz = [];  // preguntas aleatorias elegidas

// Reiniciar siempre al cargar/volver
window.addEventListener('pageshow', () => {
  clearInterval(timerInterval);
  showScreen('s-login');

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startApp(){
  const n=document.getElementById('iname').value.trim();
  const c=document.getElementById('icode').value.trim();
  if(!n||!c){alert('Ingresa tu nombre y código para continuar.');return;}
  student={name:n,code:c};
  // Reinicio completo
  phase=0; scores=[0,0,0,0]; timeLeft=3600;
  // Seleccionar 8 preguntas aleatorias del banco de 16
  selectedQuiz=shuffle(BANCO).slice(0,8);
  document.getElementById('tb-user').textContent='👤 '+n.split(' ')[0];
  startTimer();
  renderPhase(0);
  showScreen('s-caso');
}

function retryApp(){
  clearInterval(timerInterval);
  showScreen('s-login');
}

// ═══════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
    const s=String(timeLeft%60).padStart(2,'0');
    const b=document.getElementById('timer-badge');
    if(b){ b.textContent=m+':'+s;
      if(timeLeft<=600) b.classList.add('warn'); else b.classList.remove('warn'); }
    if(timeLeft<=0){ clearInterval(timerInterval); forceFinish(); }
  },1000);
}

function forceFinish(){
  alert('⏰ Tiempo terminado. Registrando tus respuestas actuales.');
  finishSim();
}

function renderStepper(){
  document.getElementById('stepper').innerHTML=PHASES_DEF.map((p,i)=>`
    ${i>0?`<div class="step-line ${i<=phase?'done':''}"></div>`:''}
    <div class="step">
      <div class="step-dot ${i<phase?'done':i===phase?'active':''}">${i<phase?'✓':i+1}</div>
      <span class="step-lbl ${i<phase?'done':i===phase?'active':''}">${p.label}</span>
    </div>`).join('');
}

// ═══════════════════════════════════════

function renderPhase(p){
  phase=p; renderStepper();
  document.getElementById('body-area').innerHTML='';
  [renderIntro,renderQuiz,renderProceso,renderPlanear,renderDirigir][p]();
}
function nextPhase(){ if(phase<4) renderPhase(phase+1); else finishSim(); }

function renderQuiz(){
  let quizAnswers=new Array(8).fill(null);
  const letters=['A','B','C','D'];

  const qHTML=selectedQuiz.map((q,qi)=>`
    <div class="q-wrap" id="qw${qi}">
      <div class="q-num">Pregunta ${qi+1} de 8</div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts${qi}">
        ${q.opts.map((o,oi)=>`
          <button class="opt" id="opt${qi}_${oi}" data-qi="${qi}" data-oi="${oi}">
            <span class="opt-lt">${letters[oi]}</span>${o}
          </button>`).join('')}
      </div>
      <div class="fb" id="fb${qi}"></div>
    </div>`).join('');

  document.getElementById('body-area').innerHTML=`
    <div class="caso-hero" style="padding:1.1rem 1.4rem;margin-bottom:1rem">
      <div class="tag">Fase 1 · Quiz Aleatorio · 25 puntos</div>
      <h2 style="font-size:1.05rem">Fundamentos Administrativos aplicados al caso</h2>
    </div>
    <div class="sec-card">
      <div class="info-box">📋 Lee cada pregunta con atención. Recibirás retroalimentación inmediata.
      Debes responder las 8 preguntas para avanzar a la siguiente fase.</div>
      <div class="quiz-score-bar">
        <span>Respondidas: <b id="q-done">0</b>/8</span>
        <span>Correctas: <b id="q-correct">0</b>/8</span>
      </div>
      ${qHTML}
      <button class="btn-next" id="btn-q-next" style="display:none" onclick="submitQuiz()">
        Continuar a Fase 2 →
      </button>
    </div>`;

  let correctCount=0;
  let doneCount=0;

  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',function(){
      const qi=parseInt(this.dataset.qi);
      const oi=parseInt(this.dataset.oi);
      if(quizAnswers[qi]!==null) return;
      quizAnswers[qi]=oi;
      doneCount++;

      const correctI=selectedQuiz[qi].ans;
      document.querySelectorAll(`#opts${qi} .opt`).forEach(b=>b.disabled=true);
      document.getElementById(`opt${qi}_${correctI}`).classList.add('correct');
      if(oi!==correctI) document.getElementById(`opt${qi}_${oi}`).classList.add('wrong');
      else correctCount++;

      const fbEl=document.getElementById('fb'+qi);
      fbEl.textContent=selectedQuiz[qi].fb;
      fbEl.className='fb show '+(oi===correctI?'ok':'ko');

      document.getElementById('q-done').textContent=doneCount;
      document.getElementById('q-correct').textContent=correctCount;

      if(doneCount===8){
        scores[0]=Math.round((correctCount/8)*25);
        document.getElementById('btn-q-next').style.display='block';
        document.getElementById('btn-q-next').scrollIntoView({behavior:'smooth'});
      }
    });
  });
}

function submitQuiz(){ nextPhase(); }

function checkProceso(){
  const selects=document.querySelectorAll('.proceso-select');
  let empty=false;
  selects.forEach(s=>{ if(s.value==='— Selecciona —') empty=true; });
  if(empty){ alert('Selecciona una etapa para cada paso del proceso.'); return; }

  let correct=0;
  selects.forEach((s,i)=>{
    if(s.value===PROCESO_ETAPAS[i]){ s.classList.add('correct-sel'); correct++; }
    else s.classList.add('wrong-sel');
    s.disabled=true;
  });

  const resultEl=document.getElementById('proceso-result');
  resultEl.style.display='block';
  resultEl.innerHTML=`<b>${correct}/6 etapas correctas.</b> ${correct===6?'¡Perfecto orden del proceso administrativo!':
    'Las etapas marcadas en rojo no están en el lugar correcto. El orden correcto sigue la secuencia del PODC más diagnóstico inicial y mejora continua.'}`; 

  window._procesoScore=correct;
  document.getElementById('flujo-section').style.display='block';
  document.getElementById('flujo-section').scrollIntoView({behavior:'smooth'});
}

function submitProceso(){
  // Check flujograma
  for(let b of FLUJO_BLANCOS){
    const el=document.getElementById(b.id);
    if(!el||el.value==='— Selecciona —'){ alert('Completa todos los nodos del flujograma.'); return; }
  }

  let flujoCorrect=0;
  FLUJO_BLANCOS.forEach(b=>{
    const el=document.getElementById(b.id);
    if(el.value===b.correcto){ el.classList.add('correct-sel'); flujoCorrect++; }
    else el.classList.add('wrong-sel');
    el.disabled=true;
  });

  const pScore=window._procesoScore||0;
  // Mapa: 6 etapas x 2pts = 12, Flujograma: 5 nodos x 2.6pts = 13 → total 25
  scores[1]=Math.min(Math.round(pScore*(12/6)+flujoCorrect*(13/5)),25);

  const res=document.getElementById('flujo-result');
  res.style.display='block';
  res.innerHTML=`<b>Flujograma: ${flujoCorrect}/5 nodos correctos.</b> Puntaje fase 2: <b>${scores[1]}/25 pts</b>`;

  setTimeout(()=>nextPhase(),2000);
}

  let ganttOk=0;

function saveRecord(total){
  const r={name:student.name,code:student.code,scores:[...scores],total,
    date:new Date().toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'})};
  const all=JSON.parse(localStorage.getItem('simadmin_v3')||'[]');

}

    :sorted.map((r,i)=>{
        const tc=r.total>=80?'bs-hi':r.total>=60?'bs-md':'bs-lo';
        return `<tr>
          <td>${medals[i]||i+1}</td>
          <td><b>${r.name}</b></td>
          <td style="color:var(--muted)">${r.code}</td>
          ${r.scores.map(s=>{const c=s>=20?'bs-hi':s>=13?'bs-md':'bs-lo';
            return `<td><span class="bscore ${c}">${s}/25</span></td>`;}).join('')}
          <td><span class="bscore ${tc}">${r.total}/100</span></td>
          <td style="color:var(--muted);font-size:.75rem">${r.date}</td>
        </tr>`;
      }).join('');
}

function exportCSV(){
  const all=JSON.parse(localStorage.getItem('simadmin_v3')||'[]');
  if(!all.length){alert('Sin registros.');return;}
  const hdr='Nombre,Código,F1-Quiz,F2-Proceso,F3-Planear,F4-Dirigir,Total,Fecha';
  const rows=all.map(r=>`"${r.name}","${r.code}",${r.scores.join(',')},${r.total},"${r.date}"`);
  const blob=new Blob([[hdr,...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='pisadas_notas.csv';a.click();
}

function clearAll(){
  if(!confirm('¿Borrar TODOS los registros? No se puede deshacer.')) return;
  localStorage.removeItem('simadmin_v3');
  renderTeacher();
}
</script>
